<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>체크 리스트</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #ddd;
            padding: 8px 16px;
            margin: 8px 0;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
        .comment {
            flex: 1;
            margin: 0 10px;
            font-size: 14px;
            color: #555;
        }
        .chk-status {
            cursor: pointer;
            transform: scale(1.5);
        }
        .nm {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>체크 리스트
	<button type="button" id="edit" class="edit">수정</button>
	<button type="button" id="apply" class="apply">바로 반영</button>
	</h1>
    <ul id="chklist">
        <!-- 데이터가 동적으로 추가됩니다 -->
    </ul>

    <script>
        // URL에서 파라미터 가져오기
        function getURLParameter(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // 데이터 불러오기 및 표시
        async function loadChkList() {
            const gp = getURLParameter('gp'); 
			const nm = getURLParameter('nm'); // 필요한 경우 파라미터 가져오기
			const response = await fetch(`/chklist?gp=${encodeURIComponent(gp)}&nm=${encodeURIComponent(nm)}`);
            if (!response.ok) {
                alert('데이터를 가져오는 데 실패했습니다.');
                return;
            }

            const data = await response.json();
            const chklist = document.getElementById('chklist');
			console.log(data)
            chklist.innerHTML = ''; // 기존 데이터 초기화

            data.forEach(row => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="nm">${row.nm}</span>
                    <span class="comment">${row.comment || '비고 없음'}</span>
					<span class="point" style="display:none;">${row.point != null ? row.point : ''}</span>
                    <input type="checkbox" class="chk-status" 
                           data-cd="${row.cd}" 
                           data-nm="${row.nm || ''}" 
                           data-comment="${row.comment || ''}" 
						   data-item-nm="${row.point || ''}" 
                           ${row.chk_status === 'Y' ? 'checked' : ''}>
                `;
                chklist.appendChild(li);
            });

            // 체크박스 상태 변경 이벤트 추가
            document.querySelectorAll('.chk-status').forEach(checkbox => {
                checkbox.addEventListener('change', async (e) => {
                    const cd = e.target.getAttribute('data-cd');
                    const nm = e.target.getAttribute('data-nm');
                    const comment = e.target.getAttribute('data-comment');
                    const chk_status = e.target.checked ? 'Y' : 'N';

                    try {
                        const response = await fetch('/updateChkStatus', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ cd, nm, comment, chk_status }),
                        });

                        if (!response.ok) {
                            alert('상태 변경 실패');
                            e.target.checked = !e.target.checked; // 상태 복원
                        }
                    } catch (error) {
                        alert('상태 변경 중 오류가 발생했습니다.');
                        console.error(error);
                        e.target.checked = !e.target.checked; // 상태 복원
                    }
                });
            });
        }

		function hideScoreFormBasedOnChk() {
		  if (getURLParameter('chk') === 'N') {
			document.getElementById('edit').style.display = 'none';
			document.getElementById('apply').style.display = 'none';
		  }
		}
		function chklistedit() {
		  document.getElementById('edit').addEventListener('click', () => {
		  const gp = getURLParameter('gp');
		  const nm = getURLParameter('nm'); // URL에서 nm 값을 가져옵니다
		  
		  if (nm) {
			window.location.href = `/chklistedit.html?gp=${encodeURIComponent(gp)}&nm=${encodeURIComponent(nm)}`; // nm 값을 전달하여 crud.html 호출
		  } else {
			alert('nm 값이 없습니다.');
		  }
		});
		}
		
		function applyChecklist() {
		  document.getElementById('apply').addEventListener('click', async () => {
			const gp = getURLParameter('gp');
			const user = getURLParameter('user') || 'system'; // 사용자 이름 없으면 기본 system
			const checkedBoxes = document.querySelectorAll('.chk-status:checked');

			let totalPoint = 0;
			let nm = '';

			checkedBoxes.forEach(box => {
			  const point = parseInt(box.getAttribute('data-item-nm')) || 0;
			  totalPoint += point;
			  if (!nm) {
				nm = box.getAttribute('data-nm'); // 첫 번째 체크된 사람 이름
			  }
			});

			if (checkedBoxes.length === 0) {
			  alert('체크된 항목이 없습니다.');
			  return;
			}

			const comment = `체크리스트 반영`;

			try {
				if(totalPoint == 0 ) {
					alert('저장할 점수가 없습니다');
					return;
				}
				
				const response = await fetch('/scores', {
					method: 'POST',
					headers: {
					  'Content-Type': 'application/json',
					},
					body: JSON.stringify({ gp, nm, point: totalPoint, comment, user }),
				});
			  
			  if (response.ok) {
				alert(`바로 반영 완료! 총점: ${totalPoint}점`);
				loadChkList(); // 리스트 다시 불러오기
			  } else {
				alert('점수가 없을경우 저장 안됨');
			  }
			} catch (error) {
			  console.error('점수 저장 중 오류:', error);
			  alert('점수 저장 실패');
			}
		  });
		}


        // 페이지 로드 시 데이터 불러오기
		window.onload = async () => {
		  loadChkList();
		  hideScoreFormBasedOnChk();
		  chklistedit();
		  applyChecklist();
		};
    </script>
</body>
</html>
