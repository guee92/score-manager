
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>체크리스트 점수 등록</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; }
    .submitBtn {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
    }
    .submitBtn:hover {
      background-color: #45a049;
    }
	.submitBtn:disabled {
	  background-color: #cccccc;
	  color: #666666;
	  cursor: not-allowed;
	}
    #scoreList li {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid #ccc;
    }
    .score-item span {
      display: inline-block;
      min-width: 80px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-4">체크리스트 점수 등록</h1>

    <h4>점수 목록</h4>
    <ul id="scoreList" class="list-group mb-4">
      <!-- 점수 항목이 동적으로 추가됩니다 -->
    </ul>
	
	<div id="name-input-container" class="d-flex flex-wrap gap-2"></div>

    <div class="mb-3 d-flex justify-content-end">
      <button id="edit" class="btn btn-outline-primary">관리</button>
    </div>

    <form id="scoreForm" class="mb-4">
      <input type="hidden" id="nm" /> <!-- 숨겨진 이름 필드 -->
      <input type="hidden" id="user" />
      <div class="row g-2 align-items-center mb-2">
        <div class="col">
          <input type="text" id="point" class="form-control" placeholder="점수" required />
        </div>
        <div class="col">
          <input type="text" id="comment" class="form-control" placeholder="비고" />
        </div>
		<div class="col">
          <input type="text" id="gp" class="form-control" placeholder="그룹" required />
        </div>
        <div class="col-auto">
          <button type="submit" id="submitBtn" class="submitBtn">점수 저장</button>
        </div>
      </div>
    </form>

    <form id="scoreForm2" class="mb-4">
      <input type="hidden" id="extraPoint" />
      <div class="form-check mb-2">
        <input class="form-check-input" type="checkbox" id="cumulativeCheck">
        <label class="form-check-label" for="cumulativeCheck">점수 누적</label>
      </div>
      <table class="table table-bordered" id="pListTable">
        <thead>
          <tr>
            <th>이름</th>
            <th>점수</th>
          </tr>
        </thead>
        <tbody id="pList">
        </tbody>
      </table>
	  <input type="number" id="extraPoint" placeholder="점수" value="0" required oninput="toggleSubmitButton()" />
      <button type="submit" id="extraSubmitBtn" class="submitBtn">점수 저장</button>
    </form>
  </div>

  <script src="script2.js"></script>
</body>
</html>
