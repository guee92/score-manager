<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>체크리스트 관리</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f4f4f4;
        }
        .action-buttons button {
            margin: 2px;
            padding: 5px 10px;
            font-size: 12px;
        }
		.hide-cd {
			display: none;
		}
		.nm-input {
			width: 50px; /* 이름 칸 너비 설정 */
			pointer-events: none; /* 수정 비활성화 */
			background-color: #f9f9f9; /* 비활성화된 느낌 제공 */
			border: none; /* 테두리 제거 */
			color: #555; /* 텍스트 색상 조정 */
		}
    </style>
</head>
<body>
    <h1>체크리스트 관리</h1>

    <form id="addForm">
        <input type="text" id="fixedName" class="nm-input" readonly>
        <input type="text" id="comment" placeholder="비고">
        <button type="submit">추가</button>
    </form>

    <table>
        <thead>
            <tr>
                <th class="hide-cd">CD</th> <!-- 숨기기 -->
                <th>이름</th>
                <th>비고</th>
				<th>연결</th>
                <th>작업</th>
            </tr>
        </thead>
        <tbody id="chklistTable">
            <!-- 데이터가 여기에 동적으로 추가됩니다 -->
        </tbody>
    </table>

    <script>
		// URL에서 파라미터 가져오기
        function getURLParameter(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }
		
        const apiUrl = '/chklistedit'; // API URL

        // 데이터 로드
        async function loadChklistEdit() {
            const nm = getURLParameter('nm'); // 필요한 경우 파라미터 가져오기
            const response = await fetch(`${apiUrl}?nm=${encodeURIComponent(nm)}`);
			
            if (!response.ok) {
                alert("데이터를 가져오는 데 실패했습니다.");
                return;
            }

            const data = await response.json();
            const tableBody = document.getElementById("chklistTable");
            tableBody.innerHTML = ""; // 기존 데이터 초기화

            data.forEach(row => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="hide-cd">${row.cd}</td> <!-- CD 숨기기 -->
                    <td><input type="text" value="${row.nm}" data-id="${row.cd}" class="nm-input" readonly></td> <!-- 수정 불가 -->
                    <td><input type="text" value="${row.comment}" data-id="${row.cd}" class="comment-input"></td>
					<td>
						<select class="connect-select" data-id="${row.cd}">
							<option value="">선택</option>
								<!-- 여기 p_list 내용으로 옵션 채울 예정 -->
						</select>
					</td>
                    <td class="action-buttons">
                        <button onclick="updateChklistRow(${row.cd})">수정</button>
                        <button onclick="deleteChklistRow(${row.cd})">삭제</button>
                    </td>
                `;
                tableBody.appendChild(tr);
				
				 if (row.item_nm) {
					const select = tr.querySelector('.connect-select');
					if (select) {
						select.setAttribute('data-connect-name', row.item_nm); 
						// → 일단 저장, loadPListOptions()에서 나중에 정확히 선택되도록 준비
					}
				}
            });
        }
		
		// 페이지 로드 시 이름을 설정
		document.addEventListener('DOMContentLoaded', () => {
			const nm = getURLParameter('nm'); // URL에서 nm 파라미터 가져오기
			const nameInput = document.getElementById('fixedName');
			if (nm) {
				nameInput.value = nm; // 이름 필드에 값 설정
			} else {
				nameInput.value = '이름 없음'; // 기본값 설정
			}
		});
		
        // 데이터 추가
        document.getElementById("addForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const nm = document.getElementById("fixedName").value.trim();
            const comment = document.getElementById("comment").value.trim();

            if (!nm) {
                alert("이름을 입력하세요.");
                return;
            }

            const response = await fetch(apiUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ nm, comment }),
            });

            if (response.ok) {
                //alert("데이터가 추가되었습니다.");
                loadChklistEdit(); // 데이터 새로고침
				loadPListOptions();
            } else {
                alert("데이터 추가에 실패했습니다.");
            }
        });

        // 데이터 수정
        async function updateChklistRow(cd) {
            const nmInput = document.querySelector(`.nm-input[data-id="${cd}"]`);
            const commentInput = document.querySelector(`.comment-input[data-id="${cd}"]`);
			const connectSelect = document.querySelector(`.connect-select[data-id="${cd}"]`);

            const nm = nmInput.value.trim();
            const comment = commentInput.value.trim();
			const item_nm = connectSelect.value;

            const response = await fetch(`${apiUrl}/${cd}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ nm, comment, item_nm }),
            });

            if (response.ok) {
                alert("데이터가 수정되었습니다.");
                loadChklistEdit();
				loadPListOptions();
            } else {
                alert("데이터 수정에 실패했습니다.");
            }
        }

        // 데이터 삭제
        async function deleteChklistRow(cd) {
            if (!confirm("정말 삭제하시겠습니까?")) return;

            const response = await fetch(`${apiUrl}/${cd}`, {
                method: "DELETE",
            });

            if (response.ok) {
                alert("데이터가 삭제되었습니다.");
                loadChklistEdit();
				loadPListOptions();
            } else {
                alert("데이터 삭제에 실패했습니다.");
            }
        }
		
		// 점수 설정
		async function loadPListOptions() {
		  try {
			const response = await fetch('/list?gp=' + encodeURIComponent(getURLParameter('gp')));
			if (!response.ok) {
			  throw new Error('p_list 가져오기 실패');
			}
			const pList = await response.json();

			document.querySelectorAll('.connect-select').forEach(select => {
			  const connectName = select.getAttribute('data-connect-name'); // 저장된 이름
			  
			  pList.forEach(item => {
				const option = document.createElement('option');
				option.value = item.nm; // 값은 nm
				option.textContent = item.nm; // 표시값은 nm
				select.appendChild(option);
			  });
			  
			  // 옵션 추가 다 한 후, 저장된 값 있으면 선택
			  if (connectName) {
			    select.value = connectName;
			  }
			});
		  } catch (error) {
			console.error(error);
			alert('p_list를 불러오는데 실패했습니다.');
		  }
		}

        // 페이지 로드 시 데이터 가져오기
        window.onload = async () => {
		  await loadChklistEdit();
		  await loadPListOptions();
		};
    </script>
</body>
</html>
