<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기준 점수 관리</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 5px;
      background-color: #f4f4f4;
    }
    h1, h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    .form-container {
      width: 95%;
      margin: 20px auto;
      display: flex;
      gap: 10px;
    }
    .form-container input { 
	  padding: 10px;
	  font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
	.form-container input.name {
	  width: 50%;
	}
	.form-container input.point {
	  width: 20%;
	}
    .form-container button {
      width: 30%;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
    }
    .form-container button:hover {
      background-color: #0056b3;
    }
    table {
      width: 95%;
      margin: 20px auto;
      border-collapse: collapse;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
	table th, table td {
      padding: 10px;
      text-align: center;
    }
	table th {
      background-color: #007bff;
      color: white;
    }
    table td {
      vertical-align: middle;
    }
    table th.name {
	  border-bottom-width : 0;
      width: 50%;
    }
    table th.point {
      width: 20%;
    }
    table th.actions {
      width: 30%;
    }
	table td.actions button {
	  padding: 5px 10px;
	  font-size: 12px;
	  border: none;
	  border-radius: 5px;
	  cursor: pointer;
	}
	/* 수정 버튼 스타일 */
	table td.actions button:nth-child(1) {
	  background-color: #28a745; /* 녹색 */
	  color: white;
	}
	table td.actions button:nth-child(1):hover {
	  background-color: #218838; /* 호버 시 더 어두운 녹색 */
	}
	/* 삭제 버튼 스타일 */
	table td.actions button:nth-child(2) {
	  background-color: #dc3545; /* 빨간색 */
	  color: white;
	}
	table td.actions button:nth-child(2):hover {
	  background-color: #c82333; /* 호버 시 더 어두운 빨간색 */
	}
  </style>
</head>
<body>
  <h1>목록 추가</h1>

  <div class="form-container">
    <input type="text" id="newNm" class="name" placeholder="이름" required />
    <input type="number" id="newPoint" class="point" placeholder="점수" required />
    <button type="button" onclick="addRow()">추가</button>
  </div>

  <h2>기존 점수 목록</h2>
  <table>
    <thead>
      <tr>
        <th class="name">이름</th>
        <th class="point">점수</th>
        <th class="actions" colspan="2">관리</th>
      </tr>
    </thead>
    <tbody id="pList">
      <!-- 목록이 동적으로 채워집니다 -->
    </tbody>
  </table>

  <script>
    function getURLParameter(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    async function loadPList() {
      const gp = getURLParameter('gp'); // URL에서 gp 값을 가져옵니다.

      try {
        const response = await fetch(`/list?gp=${encodeURIComponent(gp)}`);
        if (!response.ok) {
          throw new Error('Failed to fetch p_list');
        }

        const data = await response.json();
        const pListElement = document.getElementById('pList');
        pListElement.innerHTML = '';

        data.forEach(item => {
          const row = document.createElement('tr');
		  
		   // 숨겨진 'cd' 값 추가
		  const codeCell = document.createElement('td');
		  codeCell.style.display = 'none'; // 셀을 숨깁니다
		  codeCell.textContent = item.cd;

          const nameCell = document.createElement('td');
          nameCell.innerHTML = `<input class="editable" type="text" value="${item.nm}" style="width: 100%; padding: 5px; font-size: 14px;" />`;

		  const pointCell = document.createElement('td');
		  pointCell.innerHTML = `<input class="editable" type="number" value="${item.point}" style="width: 100%; padding: 5px; font-size: 14px;" />`;

		  // 음수 값에 따라 색상 변경
		  const pointInput = pointCell.querySelector('input'); // pointCell 내부의 input 요소 선택
		  if (item.point < 0) {
		    pointInput.style.color = '#ff7f50'; // 주황색
		  }

		  // 입력 값 변경 이벤트 추가
		  pointInput.addEventListener('input', () => {
			  if (parseFloat(pointInput.value) < 0) {
				pointInput.style.color = '#ff7f50'; // 주황색
			  } else {
				pointInput.style.color = ''; // 기본 색상 복원
			  }
		  });

          const actionsCell = document.createElement('td');
          actionsCell.classList.add('actions');
          actionsCell.innerHTML = `
            <button onclick="updateRow(this)">수정</button>
            <button onclick="deleteRow('${item.nm}')">삭제</button>
          `;

          row.appendChild(codeCell);
		  row.appendChild(nameCell);
          row.appendChild(pointCell);
          row.appendChild(actionsCell);
          pListElement.appendChild(row);
        });
      } catch (error) {
        console.error('Error:', error);
        alert('Error fetching p_list');
      }
    }

	async function addRow() {
	  const gp = getURLParameter('gp'); // URL에서 gp 값을 가져옵니다
	  const nm = document.getElementById('newNm').value;
	  const point = document.getElementById('newPoint').value;

	  if (!nm || point === '') {
		alert('이름과 점수를 입력해주세요.');
		return;
	  }

	  try {
		const response = await fetch('/add', {
		  method: 'POST',
		  headers: { 'Content-Type': 'application/json' },
		  body: JSON.stringify({ nm, point: Number(point), gp })
		});

		if (response.ok) {
		  alert('추가 완료!');
		  loadPList(); // 목록 갱신
		  document.getElementById('newNm').value = '';
		  document.getElementById('newPoint').value = '';
		} else {
		  throw new Error('추가 실패');
		}
	  } catch (error) {
		console.error('Error:', error);
		alert('Error adding row');
	  }
	}

    async function updateRow(button) {
	  const gp = getURLParameter('gp'); // URL에서 gp 값을 가져옵니다
	  const row = button.closest('tr');

	  // 숨겨진 cd 값을 가져옵니다
	  const cd = row.querySelector('td:nth-child(1)').textContent.trim();

	  // 이름과 점수를 가져옵니다
	  const newName = row.querySelector('td:nth-child(2) input').value.trim();
	  const newPoint = row.querySelector('td:nth-child(3) input').value.trim();

	  // 입력 값 검증
	  if (!newName || newPoint === '') {
		alert('이름과 점수를 모두 입력하세요.');
		return;
	  }

	  try {
		const response = await fetch('/update', {
		  method: 'POST',
		  headers: { 'Content-Type': 'application/json' },
		  body: JSON.stringify({ cd, newName, newPoint: Number(newPoint), gp }) // cd를 포함해 전송
		});

		if (response.ok) {
		  alert('수정 완료!');
		  loadPList(); // 목록 갱신
		} else {
		  const errorMessage = await response.text();
		  console.error('Server Error:', errorMessage);
		  alert('수정 실패: ' + errorMessage);
		}
	  } catch (error) {
		console.error('Error:', error);
		alert('Error updating row: ' + error.message);
	  }
	}

    async function deleteRow(name) {
      if (!confirm(`${name}을(를) 삭제하시겠습니까?`)) return;

	  const gp = getURLParameter('gp'); // URL에서 gp 값을 가져옵니다
	  
      try {
        const response = await fetch('/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, gp })
        });

        if (response.ok) {
          alert('삭제 완료!');
          loadPList();
        } else {
          throw new Error('삭제 실패');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error deleting row');
      }
    }

    document.addEventListener('DOMContentLoaded', loadPList);
  </script>
</body>
</html>
